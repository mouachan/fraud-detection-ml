---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-admin
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database }}
  POSTGRES_USER: {{ .Values.postgres.user }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres: |
    host: postgres.{{ include "fraud-detection-feast.namespace" . }}.svc.cluster.local
    port: 5432
    user: {{ .Values.postgres.user }}
    password: {{ .Values.postgres.password }}
    database: {{ .Values.postgres.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-admin
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.minio.rootUser }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.minio.rootPassword }}
  AWS_ENDPOINT_URL: http://minio.{{ include "fraud-detection-feast.namespace" . }}.svc.cluster.local:9000
  AWS_DEFAULT_REGION: us-east-1
---
# Data Connection MinIO pour le workbench RHOAI
apiVersion: v1
kind: Secret
metadata:
  name: minio-data-connection
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: MinIO Data Connection
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.minio.rootUser }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.minio.rootPassword }}
  AWS_S3_ENDPOINT: http://minio.{{ include "fraud-detection-feast.namespace" . }}.svc.cluster.local:9000
  AWS_DEFAULT_REGION: us-east-1
  AWS_S3_BUCKET: {{ .Values.minio.bucketName }}
---
# ConfigMap MLflow (non-sensible)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
data:
  MLFLOW_TRACKING_URI: {{ .Values.mlflow.trackingUri | default "https://mlflow.redhat-ods-applications.svc.cluster.local:8443" }}
  MLFLOW_S3_ENDPOINT_URL: http://minio.{{ include "fraud-detection-feast.namespace" . }}.svc.cluster.local:9000
---
# CA bundle - OpenShift injecte automatiquement les certificats CA
apiVersion: v1
kind: ConfigMap
metadata:
  name: trusted-ca-bundle
  namespace: {{ include "fraud-detection-feast.namespace" . }}
  labels:
    {{- include "fraud-detection-feast.labels" . | nindent 4 }}
    config.openshift.io/inject-ca-bundle: "true"
data: {}
