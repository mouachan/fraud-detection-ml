---
# Secret admin pour PostgreSQL (utilisé par le Deployment postgres).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-admin
  namespace: fraud-detection-ml
type: Opaque
stringData:
  POSTGRES_DB: feast_db
  POSTGRES_USER: feast_user
  POSTGRES_PASSWORD: <CHANGEZ_MOI>
---
# Secret pour le online store PostgreSQL.
# Le Feast operator attend une clé unique nommée d'après le type de store ("postgres")
# contenant les paramètres de connexion au format YAML.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: fraud-detection-ml
type: Opaque
stringData:
  postgres: |
    host: postgres.fraud-detection-ml.svc.cluster.local
    port: 5432
    user: feast_user
    password: <CHANGEZ_MOI>
    database: feast_db
---
# Secret admin MinIO (utilisé par le Deployment minio et le Job bucket).
apiVersion: v1
kind: Secret
metadata:
  name: minio-admin
  namespace: fraud-detection-ml
type: Opaque
stringData:
  MINIO_ROOT_USER: <CHANGEZ_MOI>
  MINIO_ROOT_PASSWORD: <CHANGEZ_MOI>
---
# Credentials S3/MinIO pour le registry Feast.
# Ces variables d'environnement sont injectées dans les pods Feast
# via envFrom dans le FeatureStore CR.
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: fraud-detection-ml
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: <CHANGEZ_MOI>
  AWS_SECRET_ACCESS_KEY: <CHANGEZ_MOI>
  AWS_ENDPOINT_URL: http://minio.fraud-detection-ml.svc.cluster.local:9000
  AWS_DEFAULT_REGION: us-east-1
---
# Data Connection MinIO pour le workbench RHOAI.
# Fournit les credentials S3 au notebook via env vars.
apiVersion: v1
kind: Secret
metadata:
  name: minio-data-connection
  namespace: fraud-detection-ml
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: MinIO Data Connection
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: <CHANGEZ_MOI>
  AWS_SECRET_ACCESS_KEY: <CHANGEZ_MOI>
  AWS_S3_ENDPOINT: http://minio.fraud-detection-ml.svc.cluster.local:9000
  AWS_DEFAULT_REGION: us-east-1
  AWS_S3_BUCKET: models
---
# ConfigMap pour les variables MLflow (non-sensibles).
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: fraud-detection-ml
data:
  MLFLOW_TRACKING_URI: https://mlflow.redhat-ods-applications.svc.cluster.local:8443
  MLFLOW_S3_ENDPOINT_URL: http://minio.fraud-detection-ml.svc.cluster.local:9000
---
# ConfigMap pour le CA bundle du cluster.
# OpenShift injecte automatiquement les certificats CA dans ce ConfigMap.
# Monter dans le workbench et pointer REQUESTS_CA_BUNDLE dessus.
apiVersion: v1
kind: ConfigMap
metadata:
  name: trusted-ca-bundle
  namespace: fraud-detection-ml
  labels:
    config.openshift.io/inject-ca-bundle: "true"
data: {}
